name: Squad CI

# NOTE: Disabled for this .NET project — no Node.js tests.
# Use build.yml for CI instead.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: node --test test/*.test.js
