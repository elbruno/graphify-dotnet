name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      
      - name: Restore dependencies
        run: dotnet restore graphify-dotnet.slnx
      
      - name: Build solution
        run: dotnet build graphify-dotnet.slnx --no-restore --configuration Release
      
      - name: Run tests
        run: dotnet test graphify-dotnet.slnx --no-build --configuration Release --verbosity normal --blame-hang-timeout 30s
        timeout-minutes: 5
